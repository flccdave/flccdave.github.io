<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Atkinson Hyperlegible', sans-serif;
            font-size: 14pt;
            color: #0046ad;
            background: #f0f4fb;
            min-height: 100vh;
            padding: 3rem 2rem;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: -0.01em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.75rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0, 70, 173, 0.1);
            text-decoration: none;
            color: #0046ad;
            display: block;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 70, 173, 0.18);
        }

        .thumb-wrap {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #d6e4f7;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-placeholder {
            font-size: 3.5rem;
            opacity: 0.25;
        }

        .card-body {
            padding: 1.1rem 1.25rem 1.4rem;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .card-desc {
            font-size: 0.85rem;
            line-height: 1.5;
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <h1>Dave's Portfolio</h1>
    <div class="grid" id="grid"></div>

    <script>
        // Add new app folders here as you build them
        const FOLDERS = ['cards', 'flashcards', 'games'];

        function getMeta(doc, name) {
            const el = doc.querySelector(`meta[name="${name}"]`);
            return el ? el.getAttribute('content') : null;
        }

        async function loadCard(folder) {
            try {
                const res = await fetch(`${folder}/index.html`);
                if (!res.ok) return null;
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');

                const display = getMeta(doc, 'portfolio:display');
                if (!display || display.toUpperCase() !== 'YES') return null;

                return {
                    title:       getMeta(doc, 'portfolio:title')       || folder,
                    description: getMeta(doc, 'portfolio:description') || '',
                    thumb:       getMeta(doc, 'portfolio:thumb'),
                    link:        getMeta(doc, 'portfolio:link')        || `${folder}/index.html`,
                    folder,
                };
            } catch {
                return null;
            }
        }

        function renderCard(card) {
            const thumb = card.thumb
                ? `<img src="${card.folder}/${card.thumb}" alt="${card.title}">`
                : `<span class="thumb-placeholder">&#128196;</span>`;

            return `
                <a class="card" href="${card.link}">
                    <div class="thumb-wrap">${thumb}</div>
                    <div class="card-body">
                        <div class="card-title">${card.title}</div>
                        <div class="card-desc">${card.description}</div>
                    </div>
                </a>`;
        }

        async function init() {
            const grid = document.getElementById('grid');
            const cards = (await Promise.all(FOLDERS.map(loadCard))).filter(Boolean);
            grid.innerHTML = cards.map(renderCard).join('');
        }

        init();
    </script>
</body>
</html>
